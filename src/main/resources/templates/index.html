<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>My Board</title>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
    <div class="container">
        <a class="navbar-brand" href="/">My Board App</a>
        <div class="navbar-nav ms-auto">
            <div sec:authorize="isAnonymous()" class="d-flex gap-2">
                <a class="nav-link" href="/login">로그인</a>
                <a class="nav-link btn btn-primary text-white px-3" href="/users/join">회원가입</a>
            </div>

            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-3">
                <span class="text-light small">
                    <strong sec:authentication="name" class="text-info">사용자</strong>님
                </span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-sm btn-outline-danger">로그아웃</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container text-center">
    <div class="py-5 px-4 bg-white shadow rounded-4 mx-auto" style="max-width: 600px;">
        <h1 class="display-5 fw-bold mb-4">반갑습니다! 👋</h1>

        <div sec:authorize="isAnonymous()">
            <p class="lead mb-5 text-muted">서비스를 이용하시려면 먼저 로그인을 해주세요.</p>
            <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                <a href="/login" class="btn btn-primary btn-lg px-5">로그인하기</a>
                <a href="/users/join" class="btn btn-outline-primary btn-lg px-5">회원가입</a>
            </div>
        </div>

        <div sec:authorize="isAuthenticated()">
            <p class="lead mb-5 text-muted">원하시는 서비스를 선택하세요.</p>
            <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                <a href="/boards" class="btn btn-info btn-lg px-4 text-white shadow-sm">게시글 목록</a>
                <a href="/users" class="btn btn-outline-secondary btn-lg px-4">회원 목록</a>
                <a th:href="@{/my-page}" class="btn btn-light btn-lg px-4 border">마이페이지</a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
