<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>회원 목록</title>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
    <div class="container"><a class="navbar-brand" href="/">My Board App</a></div>
</nav>

<div class="container">
    <div class="bg-white p-5 shadow rounded-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0">회원 목록 👥</h2>
            <div class="d-flex gap-2">
                <a href="/" class="btn btn-outline-secondary">홈으로</a>
                <a href="/users/join" class="btn btn-primary px-4 shadow-sm">+ 회원 등록</a>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th style="width: 10%">번호</th>
                    <th style="width: 30%">이름</th>
                    <th style="width: 40%">이메일</th>
                    <th style="width: 20%">가입일</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.userId}">1</td>
                    <td>
                        <a th:href="@{/users/{id}(id=${user.userId})}" class="text-primary text-decoration-underline">
                            <strong th:text="${user.name}">홍길동</strong>
                        </a>
                    </td>
                    <td th:text="${user.email}">test@example.com</td>
                    <td class="text-muted" th:text="${user.joinedDate}">2026-04-05</td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="4" class="text-center py-4 text-muted">가입된 회원이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
