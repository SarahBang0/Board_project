<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>회원 가입</title>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
    <div class="container"><a class="navbar-brand" href="/">My Board App</a></div>
</nav>

<div class="container">
    <div class="mx-auto bg-white p-5 shadow rounded-4" style="max-width: 500px;">
        <h2 class="mb-4 fw-bold">회원 가입</h2>
        <form action="/users" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">이름</label>
                <input type="text" name="name" class="form-control form-control-lg" placeholder="이름을 입력하세요" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">이메일</label>
                <input type="email" name="email" class="form-control form-control-lg" placeholder="example@gmail.com" required>
            </div>
            <div class="mb-5">
                <label class="form-label fw-semibold">비밀번호</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="비밀번호를 입력하세요" required>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">가입하기</button>
                <a href="/users" class="btn btn-link text-secondary">뒤로가기</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
