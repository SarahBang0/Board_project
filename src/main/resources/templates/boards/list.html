<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>게시글 목록</title>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
    <div class="container"><a class="navbar-brand" href="/">My Board App</a></div>
</nav>

<div class="container">
    <div class="bg-white p-4 shadow rounded-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">게시글 목록</h2>
            <a href="/boards/new" class="btn btn-primary">글 작성하기</a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover border-top">
                <thead class="table-light">
                <tr>
                    <th style="width: 10%">#</th>
                    <th style="width: 60%">제목</th>
                    <th style="width: 30%">작성자</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${boards.isEmpty()}">
                    <td colspan="3" class="text-center py-5 text-muted">등록된 게시글이 없습니다.</td>
                </tr>
                <tr th:each="board : ${boards}">
                    <td th:text="${board.boardId}">1</td>
                    <td>
                        <a th:href="@{/boards/{id}(id=${board.boardId})}"
                           th:text="${board.title}"
                           class="text-decoration-none text-primary fw-semibold">제목</a>
                    </td>
                    <td th:text="${board.writerName}">작성자</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="mt-3 text-end">
            <a href="/" class="btn btn-link text-secondary">홈으로</a>
        </div>
    </div>
</div>
</body>
</html>
