<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>게시글 상세보기</title>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
    <div class="container"><a class="navbar-brand" href="/">My Board App</a></div>
</nav>

<div class="container pb-5">
    <div class="mx-auto bg-white p-5 shadow rounded-4" style="max-width: 900px;">

        <div class="mb-4">
            <h2 class="fw-bold mb-3" th:text="${board.title}">게시글 제목</h2>
            <div class="d-flex justify-content-between align-items-center text-muted">
                <span>작성자:
                        <a th:href="@{/users/{userId}(userId=${board.userId})}"
                           class="text-primary fw-bold text-decoration-none">
                           <span th:text="${board.writerName}">작성자 이름</span>
                        </a>
                    </span>
                <span><b class="text-dark" th:text="${board.createdDateTime}">작성일자</b></span>
            </div>
        </div>
        <hr class="my-4">

        <div class="mb-5 py-3" style="min-height: 200px; line-height: 1.8;">
            <p th:text="${board.content}" style="white-space: pre-wrap;">내용이 들어갑니다.</p>
        </div>


        <div class="d-flex gap-2 mb-5">
            <div sec:authorize="isAuthenticated()"
                 th:if="${board.writerEmail == #authentication.name}">

                <a th:href="@{/boards/{id}/edit(id=${board.boardId})}" class="btn btn-warning px-4">수정하기</a>

                <form th:action="@{/boards/{id}/delete(id=${board.boardId})}" method="post"
                      onsubmit="return confirm('게시글을 삭제하시겠습니까?');" style="display:inline;">
                    <button type="submit" class="btn btn-danger px-4">삭제하기</button>
                </form>
            </div>

            <a href="/boards" class="btn btn-outline-secondary px-4">목록으로</a>
        </div>


        <hr class="my-5">

        <div class="comment-section">
            <h4 class="fw-bold mb-4">댓글 <span class="text-primary" th:text="${comments != null ? comments.size() : 0}">0</span></h4>

            <div th:each="comment : ${comments}" class="mb-3 p-3 bg-light rounded-3">
                <div class="d-flex justify-content-between mb-2">
                    <div>
                        <strong th:text="${comment.writerName}">댓글작성자</strong>
                        <small th:text="${comment.createdDateTime}" class="text-muted ms-2"></small>
                    </div>

                    <div sec:authorize="isAuthenticated()"
                         th:if="${comment.writerEmail == #authentication.name}">
                        <div class="d-flex gap-1">
                            <a th:href="@{/boards/{boardId}/comments/{commentId}/edit(boardId=${board.boardId},commentId=${comment.commentId})}" class="btn btn-sm btn-outline-primary">수정</a>
                            <form th:action="@{/boards/{boardId}/comments/{commentId}/delete(boardId=${board.boardId},commentId=${comment.commentId})}" method="post" class="m-0">
                                <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                            </form>
                        </div>
                    </div>
                </div>
                <p class="mb-0" th:text="${comment.content}">댓글 내용입니다.</p>
            </div>

            <div class="mt-4 p-4 border rounded-4 bg-light">
                <h5 class="fw-bold mb-3">댓글 남기기</h5>
                <form th:action="@{/boards/{boardId}/comments(boardId=${board.boardId})}" method="post">
                    <div class="mb-3">
                        <textarea name="content" class="form-control" rows="3" placeholder="댓글을 남겨주세요." required></textarea>
                    </div>
                    <div class="text-end">
                        <button type="submit" class="btn btn-primary px-4">댓글 등록</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
