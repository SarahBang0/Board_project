<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>게시글 수정</title>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
    <div class="container"><a class="navbar-brand" href="/">My Board App</a></div>
</nav>

<div class="container">
    <div class="mx-auto bg-white p-5 shadow rounded-4" style="max-width: 800px;">
        <h2 class="mb-2 fw-bold text-warning">게시글 수정</h2>
        <p class="text-muted mb-4">내용을 수정한 후 저장 버튼을 눌러주세요.</p>

        <form th:action="@{/boards/{id}(id=${board.boardId})}" method="post">
            <input type="hidden" name="_method" value="PATCH"/>

            <div class="mb-3">
                <label class="form-label fw-semibold">제목</label>
                <input type="text" name="title" class="form-control form-control-lg"
                       th:value="${board.title}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold text-muted">작성자</label>
                <input type="text" class="form-control bg-light"
                       th:value="${board.writerName}" readonly>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">내용</label>
                <textarea name="content" class="form-control" rows="10"
                          th:text="${board.content}" required></textarea>
            </div>

            <div class="d-flex gap-2 border-top pt-4">
                <button type="submit" class="btn btn-warning btn-lg px-5 fw-bold">수정 완료</button>
                <a th:href="@{/boards/{id}(id=${board.boardId})}" class="btn btn-outline-secondary btn-lg px-4">취소</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
