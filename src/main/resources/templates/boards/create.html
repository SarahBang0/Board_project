<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>새 게시글 작성</title>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
    <div class="container"><a class="navbar-brand" href="/">My Board App</a></div>
</nav>

<div class="container">
    <div class="mx-auto bg-white p-5 shadow rounded-4" style="max-width: 800px;">
        <h2 class="mb-4 fw-bold text-primary">새 글 쓰기</h2>
        <p class="text-muted mb-4">멋진 생각을 커뮤니티와 공유해보세요.</p>

        <form action="/boards" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">제목</label>
                <input type="text" name="title" class="form-control form-control-lg"
                       placeholder="제목을 입력하세요" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">내용</label>
                <textarea name="content" class="form-control" rows="10"
                          placeholder="내용을 자유롭게 작성하세요" required></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary btn-lg px-5">등록하기</button>
                <a href="/boards" class="btn btn-outline-secondary btn-lg px-4">취소</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
