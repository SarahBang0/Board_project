<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>댓글 수정</title>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
    <div class="container"><a class="navbar-brand" href="/">My Board App</a></div>
</nav>

<div class="container">
    <div class="mx-auto bg-white p-5 shadow rounded-4" style="max-width: 700px;">
        <h3 class="fw-bold mb-4">댓글 수정하기</h3>

        <form th:action="@{/boards/{boardId}/comments/{cId}/edit(boardId=${boardId}, cId=${comment.commentId})}" method="post">
            <div class="mb-4">
                <label class="form-label fw-bold">작성자</label>
                <input type="text" class="form-control bg-light" th:value="${comment.writerName}" readonly>
                <div class="form-text">작성자는 수정할 수 없습니다.</div>
            </div>

            <div class="mb-4">
                <label for="content" class="form-label fw-bold">댓글 내용</label>
                <textarea id="content" name="content" class="form-control" rows="5"
                          th:text="${comment.content}" required></textarea>
            </div>

            <div class="d-flex gap-2 justify-content-end">
                <a th:href="@{/boards/{boardId}(boardId=${boardId})}" class="btn btn-outline-secondary px-4">취소</a>
                <button type="submit" class="btn btn-primary px-4">수정 완료</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
