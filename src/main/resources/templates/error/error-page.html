<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>에러 페이지</title>
</head>


<div class="card error-card p-5 text-center bg-white">
    <div class="mb-4">
        <div class="error-icon">⚠️</div>
    </div>

    <h2 class="fw-bold text-dark mb-3">요청을 처리할 수 없습니다</h2>

    <p class="text-danger fw-bold fs-5 mb-4" th:text="${errorMessage}">에러 메시지</p>

    <div class="bg-light p-3 rounded-3 mb-4 text-start">
        <div class="mb-1">
            <span class="badge bg-secondary">Error Type</span>
            <small class="ms-2 text-dark mono" th:text="${errorName}">ExceptionName</small>
        </div>
        <div>
            <span class="badge bg-secondary">Error Code</span>
            <small class="ms-2 text-dark fw-bold" th:text="${errorCode}">E001</small>
        </div>
    </div>

    <div class="d-grid gap-2">
        <a href="/" class="btn btn-primary btn-lg rounded-pill">메인 페이지로 이동</a>
        <button onclick="history.back()" class="btn btn-outline-secondary btn-lg rounded-pill">이전 페이지로</button>
    </div>

</div>
